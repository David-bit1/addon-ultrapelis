<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Video no disponible</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0f1a;
        color: #e5e9f7;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      .card {
        max-width: 520px;
        margin: 0 16px;
        padding: 28px;
        border-radius: 16px;
        background: #12182a;
        border: 1px solid #263152;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #b8c2e6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Video no disponible</h1>
    </div>
  </body>
</html>
